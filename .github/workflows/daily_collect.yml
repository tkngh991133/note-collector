name: note記事収集・配信

on:
  schedule:
    # 毎朝 7:00 JST = 22:00 UTC (前日)
    - cron: "0 22 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # sent_ids.json をコミットするため

jobs:
  collect-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: collector/requirements.txt

      - name: 依存ライブラリのインストール
        run: pip install -r collector/requirements.txt

      - name: 記事収集・要約・配信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python collector/main.py

      - name: 送信済みIDをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_ids.json
          git diff --cached --quiet || git commit -m "chore: update sent_ids [skip ci]"
          git push
